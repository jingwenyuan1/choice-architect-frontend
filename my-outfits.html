<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Outfits — The Choice Architect</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="results-header">
    <a href="index.html" class="results-logo">The Choice Architect</a>
    <div class="results-header-right">
      <div class="avatar-wrapper">
        <button class="avatar-btn" id="avatarBtn" aria-label="Profile menu" aria-expanded="false">
          <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="12" cy="8" r="4"/>
            <path d="M4 20c0-4.4 3.6-8 8-8s8 3.6 8 8"/>
          </svg>
        </button>
        <div class="avatar-dropdown" id="avatarDropdown">
          <a href="my-outfits.html" class="avatar-dropdown-item">My Outfits</a>
          <a href="my-wishlists.html" class="avatar-dropdown-item">My Wishlists</a>
          <a href="purchases.html" class="avatar-dropdown-item">My Purchases</a>
        </div>
      </div>
    </div>
  </header>

  <main class="outfits-main">
    <h1 class="outfits-heading">My Outfits</h1>
    <div class="outfits-grid" id="outfitsGrid"></div>
    <p class="outfits-empty" id="outfitsEmpty" style="display:none;">
      No outfits yet. Save products from the generator to build your first outfit.
    </p>
  </main>

  <script>
    function getOutfits() {
      return JSON.parse(localStorage.getItem('tca_outfits') || '[]');
    }

    function buildPreviewImgs(products) {
      const items = products.slice(0, 3);
      const count = items.length;
      if (count === 0) return '';
      const pct = count === 1 ? 50 : count === 2 ? 50 : 33.334;
      return items.map(p =>
        `<img src="${p.image_url}" style="width:${pct}%;height:100%;object-fit:cover;flex-shrink:0;display:block;" alt="">`
      ).join('');
    }

    function render() {
      const grid       = document.getElementById('outfitsGrid');
      const empty      = document.getElementById('outfitsEmpty');
      const outfits = getOutfits();

      if (outfits.length === 0) {
        grid.innerHTML       = '';
        empty.style.display  = 'block';
        return;
      }

      empty.style.display = 'none';
      grid.innerHTML = outfits.map(coll => {
        const nameEsc = coll.name.replace(/&/g, '&amp;').replace(/</g, '&lt;');
        const preview = buildPreviewImgs(coll.products);
        return `<a href="outfit.html?id=${encodeURIComponent(coll.id)}" class="outfit-card">
          <div class="outfit-preview">${preview}</div>
          <span class="outfit-card-name">${nameEsc}</span>
        </a>`;
      }).join('');
    }

    render();
  </script>

  <script>
    (function () {
      var btn = document.getElementById('avatarBtn');
      var dd  = document.getElementById('avatarDropdown');
      btn.addEventListener('click', function (e) {
        e.stopPropagation();
        var open = dd.classList.toggle('is-open');
        btn.setAttribute('aria-expanded', String(open));
      });
      document.addEventListener('click', function () {
        dd.classList.remove('is-open');
        btn.setAttribute('aria-expanded', 'false');
      });
    })();
  </script>

</body>
</html>
