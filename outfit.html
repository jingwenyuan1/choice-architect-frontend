<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Outfit — The Choice Architect</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="results-header">
    <a href="index.html" class="results-logo">The Choice Architect</a>
    <div class="results-header-right">
      <div class="avatar-wrapper">
        <button class="avatar-btn" id="avatarBtn" aria-label="Profile menu" aria-expanded="false">
          <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="12" cy="8" r="4"/>
            <path d="M4 20c0-4.4 3.6-8 8-8s8 3.6 8 8"/>
          </svg>
        </button>
        <div class="avatar-dropdown" id="avatarDropdown">
          <a href="my-outfits.html" class="avatar-dropdown-item">My Outfits</a>
          <a href="my-wishlists.html" class="avatar-dropdown-item">My Wishlists</a>
          <a href="purchases.html" class="avatar-dropdown-item">My Purchases</a>
        </div>
      </div>
    </div>
  </header>

  <div class="outfit-detail-header">
    <div class="edit-name-container">
      <h1 class="outfit-detail-heading" id="collectionName"></h1>
    </div>
    <div class="coll-header-actions">
      <a id="openInGeneratorBtn" href="#" class="open-in-generator-btn">
        Open in generator
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <line x1="5" y1="12" x2="19" y2="12"/>
          <polyline points="12 5 19 12 12 19"/>
        </svg>
      </a>
      <div class="kebab-wrap" id="kebabWrap">
        <button class="kebab-btn" id="kebabBtn" aria-label="More options">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="#fffaf5" aria-hidden="true">
            <circle cx="12" cy="5"  r="1.5"/>
            <circle cx="12" cy="12" r="1.5"/>
            <circle cx="12" cy="19" r="1.5"/>
          </svg>
        </button>
        <div class="kebab-dropdown" id="kebabDropdown">
          <button class="kebab-item" id="renameCollBtn">Rename outfit</button>
          <button class="kebab-item kebab-item-danger" id="deleteCollBtn">Delete outfit</button>
        </div>
      </div>
    </div>
  </div>

  <section class="products-section">
    <div class="products-scroll-wrapper">
      <div class="products-track" id="productsGrid">
        <p class="no-results" id="noResults" style="display:none;">No products saved.</p>
      </div>
    </div>
  </section>

  <!-- ── Confirm remove product modal ────────────────── -->
  <div class="confirm-modal-overlay" id="confirmModal" role="dialog" aria-modal="true">
    <div class="confirm-modal-box">
      <p class="confirm-modal-title">Are you sure?</p>
      <div class="confirm-modal-actions">
        <button class="confirm-modal-cancel" id="confirmCancelBtn">Cancel</button>
        <button class="confirm-modal-confirm" id="confirmRemoveBtn">Remove</button>
      </div>
    </div>
  </div>

  <!-- ── Delete outfit modal ─────────────────────── -->
  <div class="confirm-modal-overlay" id="deleteCollModal" role="dialog" aria-modal="true">
    <div class="confirm-modal-box">
      <p class="confirm-modal-title">Are you sure?</p>
      <div class="confirm-modal-actions">
        <button class="confirm-modal-cancel" id="deleteCollCancelBtn">Cancel</button>
        <button class="confirm-modal-confirm" id="deleteCollConfirmBtn">Delete</button>
      </div>
    </div>
  </div>

  <!-- ── Save modal ────────────────────────────── -->
  <div class="save-modal-overlay" id="saveModal" role="dialog" aria-modal="true">
    <div class="save-modal-box">
      <h2 class="save-modal-title">Save</h2>

      <div class="save-tabs" id="saveTabs">
        <button class="save-tab is-active" data-tab="outfit">Outfit</button>
        <button class="save-tab" data-tab="wishlist">Wishlist</button>
        <span class="save-tab-indicator"></span>
      </div>

      <div class="save-tab-panel is-active" data-panel="outfit">
        <div class="save-modal-input-row">
          <input type="text" id="saveOutfitInput" class="save-modal-input" placeholder="New outfit name" autocomplete="off">
          <button class="save-modal-add-btn" id="saveOutfitAddBtn" aria-label="Focus outfit name field">
            <svg width="12" height="12" viewBox="0 0 12 12" fill="none" aria-hidden="true">
              <line x1="1" y1="6" x2="11" y2="6" stroke="#fffaf5" stroke-width="1.5" stroke-linecap="round"/>
              <line x1="6" y1="1" x2="6" y2="11" stroke="#fffaf5" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
          </button>
        </div>
        <div class="save-modal-list" id="listOutfit"></div>
      </div>

      <div class="save-tab-panel" data-panel="wishlist">
        <div class="save-modal-input-row">
          <input type="text" id="saveWishlistInput" class="save-modal-input" placeholder="New wishlist name" autocomplete="off">
          <button class="save-modal-add-btn" id="saveWishlistAddBtn" aria-label="Focus wishlist name field">
            <svg width="12" height="12" viewBox="0 0 12 12" fill="none" aria-hidden="true">
              <line x1="1" y1="6" x2="11" y2="6" stroke="#fffaf5" stroke-width="1.5" stroke-linecap="round"/>
              <line x1="6" y1="1" x2="6" y2="11" stroke="#fffaf5" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
          </button>
        </div>
        <div class="save-modal-list" id="listWishlist"></div>
      </div>

      <div class="save-modal-actions">
        <button class="save-modal-cancel-btn" id="saveModalCancel">Cancel</button>
        <button class="save-modal-confirm-btn" id="saveModalSave">Save</button>
      </div>
    </div>
  </div>

  <script>
    // ── SVG constants ───────────────────────────────────────────────────
    const STAR_SVG = `<svg width="11" height="11" viewBox="0 0 24 24" fill="currentColor" stroke="none"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>`;
    const SAVE_SVG = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>`;

    // ── Outfits helpers ────────────────────────────────────────────
    function getOutfits() {
      return JSON.parse(localStorage.getItem('tca_outfits') || '[]');
    }
    function saveOutfits(cs) {
      localStorage.setItem('tca_outfits', JSON.stringify(cs));
    }

    // ── Load this collection ───────────────────────────────────────────
    const params       = new URLSearchParams(window.location.search);
    const collectionId = params.get('id') || '';
    let   collection   = null;

    function loadCollection() {
      const cs = getOutfits();
      collection = cs.find(c => c.id === collectionId) || null;
    }

    loadCollection();

    if (collection) {
      const nameEl = document.getElementById('collectionName');
      if (collection.name) {
        nameEl.textContent = collection.name;
        document.title = collection.name + ' — The Choice Architect';
      } else {
        nameEl.textContent = 'New outfit';
        nameEl.classList.add('is-untitled');
        document.title = 'New outfit — The Choice Architect';
      }
      document.getElementById('openInGeneratorBtn').href =
        'outfit-generator.html?collection=' + encodeURIComponent(collectionId);
    }

    document.getElementById('openInGeneratorBtn').addEventListener('click', function () {
      loadCollection();
      if (collection && collection.products.length > 0) {
        localStorage.setItem('generatorProducts', JSON.stringify(collection.products));
      }
    });

    // ── Build tag rows (no lock buttons) ──────────────────────────────
    function buildTagRows(product) {
      const t = product && product.tags;
      if (!t || typeof t !== 'object') return '';
      const _DESIGN_LABEL = {
        fit: 'Fit', length: 'Length', sleeve_length: 'Sleeve Length',
        neckline: 'Neckline', rise: 'Rise',
        heel_height: 'Heel Height', heel_type: 'Heel Type',
      };
      const rows = [];
      if (t.color) {
        const vals = Array.isArray(t.color) ? t.color : [t.color];
        if (vals.length) rows.push(`<div class="product-tag-row"><span class="product-detail">Color: ${vals.join(', ')}</span></div>`);
      }
      if (t.material) {
        const m = t.material;
        rows.push(`<div class="product-tag-row"><span class="product-detail">Material: ${m.charAt(0).toUpperCase() + m.slice(1)}</span></div>`);
      }
      const d = t.design;
      if (d) {
        if (typeof d === 'object' && !Array.isArray(d)) {
          for (const [k, v] of Object.entries(d)) {
            const label = _DESIGN_LABEL[k] || (k.charAt(0).toUpperCase() + k.slice(1).replace(/_/g, ' '));
            const vals  = Array.isArray(v) ? v : [v];
            rows.push(`<div class="product-tag-row"><span class="product-detail">${label}: ${vals.join(', ')}</span></div>`);
          }
        } else if (Array.isArray(d)) {
          rows.push(`<div class="product-tag-row"><span class="product-detail">Design: ${d.join(', ')}</span></div>`);
        } else if (typeof d === 'string') {
          rows.push(`<div class="product-tag-row"><span class="product-detail">Design: ${d}</span></div>`);
        }
      }
      if (t.pattern) {
        rows.push(`<div class="product-tag-row"><span class="product-detail">Pattern: ${t.pattern}</span></div>`);
      }
      if (t.occasion) {
        const vals = Array.isArray(t.occasion) ? t.occasion : [t.occasion];
        if (vals.length) rows.push(`<div class="product-tag-row"><span class="product-detail">Occasion: ${vals.join(', ')}</span></div>`);
      }
      return rows.join('');
    }

    // ── Build one card ─────────────────────────────────────────────────
    function buildCardHTML(product) {
      const imgSrc    = product.image_url;
      const nameEsc   = product.name.replace(/&/g, '&amp;').replace(/</g, '&lt;');
      const priceText = product.price != null
        ? '$' + Number(product.price).toFixed(2)
        : '$Price';
      const href      = product.link || '#';
      const linkAttrs = product.link ? ' target="_blank" rel="noopener"' : '';
      const tagRows   = buildTagRows(product);

      return `<div class="product-card" data-id="${product.id}">
        <img class="product-img" src="${imgSrc}" alt="${nameEsc}" loading="lazy">
        <div class="card-overlay">
          <div class="overlay-top">
            <button class="close-btn coll-remove-btn" aria-label="Remove from outfit" data-id="${product.id}">
              <svg width="12" height="12" viewBox="0 0 12 12" fill="none" aria-hidden="true">
                <line x1="1" y1="1" x2="11" y2="11" stroke="#fffaf5" stroke-width="1.5" stroke-linecap="round"/>
                <line x1="11" y1="1" x2="1" y2="11" stroke="#fffaf5" stroke-width="1.5" stroke-linecap="round"/>
              </svg>
            </button>
            <div class="dots-grid">
              <div class="dot"></div><div class="dot"></div><div class="dot"></div>
              <div class="dot"></div><div class="dot"></div><div class="dot"></div>
            </div>
            <div style="width:24px;"></div>
          </div>
          <div class="card-info">
            <div class="card-info-frozen">
              <h3 class="product-name">${nameEsc}</h3>
              <span class="product-brand">Brand name</span>
              <div class="product-price-rating">
                <span>${priceText}</span>
                <span class="product-rating">${STAR_SVG} 5.0</span>
              </div>
            </div>
            <div class="card-attrs-scroll">${tagRows}</div>
          </div>
          <div class="card-footer">
            <a href="${href}"${linkAttrs} class="product-webpage-btn">Product Webpage</a>
            <button class="save-btn" aria-label="Save to outfit" data-id="${product.id}">${SAVE_SVG}</button>
          </div>
        </div>
      </div>`;
    }

    // ── Render all products ────────────────────────────────────────────
    function renderProducts() {
      const grid     = document.getElementById('productsGrid');
      const noResult = document.getElementById('noResults');
      grid.querySelectorAll('.product-card').forEach(c => c.remove());
      if (!collection || collection.products.length === 0) {
        noResult.style.display = 'block';
        return;
      }
      noResult.style.display = 'none';
      collection.products.forEach(p => {
        const tmp = document.createElement('div');
        tmp.innerHTML = buildCardHTML(p).trim();
        grid.insertBefore(tmp.firstElementChild, noResult);
      });
    }

    renderProducts();

    // ── Confirm remove product modal ───────────────────────────────────
    let pendingRemoveId = null;

    function openConfirmModal(pid) {
      pendingRemoveId = pid;
      document.getElementById('confirmModal').classList.add('is-open');
    }
    function closeConfirmModal() {
      document.getElementById('confirmModal').classList.remove('is-open');
      pendingRemoveId = null;
    }

    document.getElementById('confirmCancelBtn').addEventListener('click', closeConfirmModal);
    document.getElementById('confirmModal').addEventListener('click', function (e) {
      if (e.target === this) closeConfirmModal();
    });
    document.getElementById('confirmRemoveBtn').addEventListener('click', function () {
      if (!pendingRemoveId) return;
      const cs  = getOutfits();
      const col = cs.find(c => c.id === collectionId);
      if (col) {
        col.products = col.products.filter(p => p.id !== pendingRemoveId);
        saveOutfits(cs);
        loadCollection();
        renderProducts();
      }
      closeConfirmModal();
    });

    // ── Product grid click handler ─────────────────────────────────────
    document.getElementById('productsGrid').addEventListener('click', function (e) {
      const removeBtn = e.target.closest('.coll-remove-btn');
      if (removeBtn) { e.stopPropagation(); openConfirmModal(removeBtn.dataset.id); return; }
      const saveBtn = e.target.closest('.save-btn');
      if (saveBtn) {
        e.stopPropagation();
        const pid  = saveBtn.dataset.id;
        const prod = collection && collection.products.find(p => p.id === pid);
        openSaveModal(prod || null);
      }
    });

    // ── Click-drag scroll ──────────────────────────────────────────────
    (function () {
      var scroller = document.querySelector('.products-scroll-wrapper');
      var isDown = false, startX, scrollLeft;
      scroller.addEventListener('mousedown', function (e) {
        isDown = true; scroller.style.cursor = 'grabbing';
        startX = e.pageX - scroller.offsetLeft; scrollLeft = scroller.scrollLeft;
      });
      document.addEventListener('mouseup', function () { isDown = false; scroller.style.cursor = ''; });
      scroller.addEventListener('mouseleave', function () { isDown = false; scroller.style.cursor = ''; });
      scroller.addEventListener('mousemove', function (e) {
        if (!isDown) return;
        e.preventDefault();
        scroller.scrollLeft = scrollLeft - (e.pageX - scroller.offsetLeft - startX) * 1.2;
      });
    })();

    // ── Save modal ──────────────────────────────────────
    function getWishlists() {
      return JSON.parse(localStorage.getItem('tca_wishlists') || '[]');
    }
    function saveWishlists(ws) {
      localStorage.setItem('tca_wishlists', JSON.stringify(ws));
    }

    const CHECK_SVG = `<svg width="14" height="14" viewBox="0 0 14 14" fill="none"><polyline points="2,7 5,10.5 12,3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
    const PLUS_SVG  = `<svg width="14" height="14" viewBox="0 0 14 14" fill="none"><line x1="7" y1="2" x2="7" y2="12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><line x1="2" y1="7" x2="12" y2="7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>`;

    let currentSaveProduct = null;
    let pendingOutfitIds   = new Set();
    let pendingWishlistIds = new Set();

    function renderSaveList(listId, items, pendingIds, typeLabel) {
      const list = document.getElementById(listId);
      const fallback = typeLabel === 'outfit' ? 'New outfit' : 'New Wishlist';
      if (items.length === 0) {
        list.innerHTML = '<p class="save-modal-empty">None saved yet</p>';
        return;
      }
      list.innerHTML = items.map(item => {
        const isPending = pendingIds.has(item.id);
        const nameEsc = (item.name || fallback).replace(/&/g, '&amp;').replace(/</g, '&lt;');
        const thumb = item.products && item.products[0]
          ? `<img src="${item.products[0].image_url}" style="width:52px;height:52px;object-fit:cover;border-radius:6px;flex-shrink:0;" alt="">`
          : `<div class="save-outfit-thumb"></div>`;
        return `<div class="save-outfit-item${isPending ? ' is-pending' : ''}" data-item-id="${item.id}" data-item-type="${typeLabel}">
          ${thumb}
          <span class="save-outfit-name">${nameEsc}</span>
          ${isPending ? CHECK_SVG : PLUS_SVG}
        </div>`;
      }).join('');
    }

    function renderModalOutfits()   { renderSaveList('listOutfit',   getOutfits(),   pendingOutfitIds,   'outfit');   }
    function renderModalWishlists() { renderSaveList('listWishlist',  getWishlists(), pendingWishlistIds, 'wishlist'); }

    function switchSaveTab(tabName) {
      document.querySelectorAll('.save-tab').forEach(t =>
        t.classList.toggle('is-active', t.dataset.tab === tabName));
      document.querySelectorAll('.save-tab-panel').forEach(p =>
        p.classList.toggle('is-active', p.dataset.panel === tabName));
      document.querySelector('.save-tab-indicator').style.transform =
        tabName === 'wishlist' ? 'translateX(100%)' : 'translateX(0%)';
    }

    function openSaveModal(product) {
      currentSaveProduct = product || null;
      pendingOutfitIds.clear();
      pendingWishlistIds.clear();
      if (product) {
        getOutfits().forEach(o => {
          if (o.products.some(p => p.id === product.id)) pendingOutfitIds.add(o.id);
        });
        getWishlists().forEach(wl => {
          if (wl.products.some(p => p.id === product.id)) pendingWishlistIds.add(wl.id);
        });
      }
      document.getElementById('saveOutfitInput').value = '';
      document.getElementById('saveWishlistInput').value = '';
      renderModalOutfits();
      renderModalWishlists();
      switchSaveTab('outfit');
      document.getElementById('saveModal').classList.add('is-open');
    }

    function closeSaveModal() {
      document.getElementById('saveModal').classList.remove('is-open');
      currentSaveProduct = null;
      pendingOutfitIds.clear();
      pendingWishlistIds.clear();
    }

    document.querySelectorAll('.save-tab').forEach(tab => {
      tab.addEventListener('click', () => switchSaveTab(tab.dataset.tab));
    });

    function createAndSave(type) {
      const inputId = type === 'outfit' ? 'saveOutfitInput' : 'saveWishlistInput';
      const input   = document.getElementById(inputId);
      const name    = input.value.trim();
      if (!name) { input.focus(); return; }
      const newId   = Date.now().toString(36) + Math.random().toString(36).slice(2);
      const newItem = { id: newId, name, products: currentSaveProduct ? [currentSaveProduct] : [] };
      if (type === 'outfit') {
        const outfits = getOutfits();
        outfits.unshift(newItem);
        saveOutfits(outfits);
        if (currentSaveProduct) pendingOutfitIds.add(newId);
        renderModalOutfits();
      } else {
        const wishlists = getWishlists();
        wishlists.unshift(newItem);
        saveWishlists(wishlists);
        if (currentSaveProduct) pendingWishlistIds.add(newId);
        renderModalWishlists();
      }
      input.value = '';
    }

    document.getElementById('saveOutfitAddBtn').addEventListener('click', () => createAndSave('outfit'));
    document.getElementById('saveWishlistAddBtn').addEventListener('click', () => createAndSave('wishlist'));

    document.getElementById('saveOutfitInput').addEventListener('keydown', function (e) {
      if (e.key === 'Enter') { e.preventDefault(); createAndSave('outfit'); }
    });
    document.getElementById('saveWishlistInput').addEventListener('keydown', function (e) {
      if (e.key === 'Enter') { e.preventDefault(); createAndSave('wishlist'); }
    });

    document.getElementById('saveModal').addEventListener('click', function (e) {
      if (e.target === this) { closeSaveModal(); return; }
      const item = e.target.closest('.save-outfit-item');
      if (!item) return;
      e.stopPropagation();
      const type = item.dataset.itemType;
      const id   = item.dataset.itemId;
      if (type === 'outfit') {
        if (pendingOutfitIds.has(id)) pendingOutfitIds.delete(id);
        else pendingOutfitIds.add(id);
        renderModalOutfits();
      } else if (type === 'wishlist') {
        if (pendingWishlistIds.has(id)) pendingWishlistIds.delete(id);
        else pendingWishlistIds.add(id);
        renderModalWishlists();
      }
    });

    document.getElementById('saveModalCancel').addEventListener('click', closeSaveModal);

    document.getElementById('saveModalSave').addEventListener('click', function () {
      const product = currentSaveProduct;
      if (!product) { closeSaveModal(); return; }

      const outfitName = document.getElementById('saveOutfitInput').value.trim();
      if (outfitName) {
        const outfits = getOutfits();
        outfits.push({ id: Date.now().toString(36) + Math.random().toString(36).slice(2), name: outfitName, products: [product] });
        saveOutfits(outfits);
      }
      const outfits = getOutfits();
      let outfitDirty = false;
      for (const o of outfits) {
        const has  = o.products.some(p => p.id === product.id);
        const want = pendingOutfitIds.has(o.id);
        if (want && !has)  { o.products.push(product); outfitDirty = true; }
        if (!want && has)  { o.products = o.products.filter(p => p.id !== product.id); outfitDirty = true; }
      }
      if (outfitDirty) saveOutfits(outfits);

      const wishlistName = document.getElementById('saveWishlistInput').value.trim();
      if (wishlistName) {
        const wishlists = getWishlists();
        wishlists.push({ id: Date.now().toString(36) + Math.random().toString(36).slice(2), name: wishlistName, products: [product] });
        saveWishlists(wishlists);
      }
      const wishlists = getWishlists();
      let wlDirty = false;
      for (const wl of wishlists) {
        const has  = wl.products.some(p => p.id === product.id);
        const want = pendingWishlistIds.has(wl.id);
        if (want && !has)  { wl.products.push(product); wlDirty = true; }
        if (!want && has)  { wl.products = wl.products.filter(p => p.id !== product.id); wlDirty = true; }
      }
      if (wlDirty) saveWishlists(wishlists);

      closeSaveModal();
    });

    // ── Kebab menu ─────────────────────────────────────────────────────
    const kebabBtn      = document.getElementById('kebabBtn');
    const kebabDropdown = document.getElementById('kebabDropdown');

    function openKebab()  { kebabDropdown.classList.add('is-open'); }
    function closeKebab() { kebabDropdown.classList.remove('is-open'); }

    kebabBtn.addEventListener('click', function (e) {
      e.stopPropagation();
      kebabDropdown.classList.contains('is-open') ? closeKebab() : openKebab();
    });
    document.addEventListener('click', function (e) {
      if (!document.getElementById('kebabWrap').contains(e.target)) closeKebab();
    });

    // ── Rename outfit ──────────────────────────────────────────────
    function measureTextWidth(text, font) {
      const c = measureTextWidth._c || (measureTextWidth._c = document.createElement('canvas'));
      const ctx = c.getContext('2d');
      ctx.font = font;
      return ctx.measureText(text).width;
    }

    function startRename() {
      closeKebab();
      const nameEl = document.getElementById('collectionName');
      if (document.querySelector('.edit-name-input')) return;
      const currentName = nameEl.classList.contains('is-untitled') ? '' : nameEl.textContent.trim();
      const style       = window.getComputedStyle(nameEl);
      const font        = style.fontSize + ' ' + style.fontFamily;
      const MAX_W       = Math.floor(window.innerWidth / 3);
      const MIN_W       = 120;

      const input = document.createElement('input');
      input.type      = 'text';
      input.value     = currentName;
      input.className = 'edit-name-input';

      function resize() {
        const w = measureTextWidth(input.value || input.placeholder, font);
        input.style.width = Math.min(MAX_W, Math.max(MIN_W, Math.ceil(w) + 20)) + 'px';
      }
      resize();
      input.addEventListener('input', resize);

      nameEl.replaceWith(input);
      input.focus();
      input.select();

      function commit() {
        const newName = input.value.trim();
        const cs      = getOutfits();
        const coll    = cs.find(c => c.id === collectionId);
        if (coll && newName !== coll.name) { coll.name = newName; saveOutfits(cs); }
        if (newName) {
          nameEl.textContent = newName;
          nameEl.classList.remove('is-untitled');
          document.title = newName + ' — The Choice Architect';
        } else {
          nameEl.textContent = 'New outfit';
          nameEl.classList.add('is-untitled');
          document.title = 'New outfit — The Choice Architect';
        }
        if (input.parentNode) input.replaceWith(nameEl);
      }

      input.addEventListener('keydown', function (e) {
        if (e.key === 'Enter')  { e.preventDefault(); commit(); }
        if (e.key === 'Escape') { if (input.parentNode) input.replaceWith(nameEl); }
      });
      input.addEventListener('blur', commit);
    }

    document.getElementById('renameCollBtn').addEventListener('click', startRename);

    // ── Delete outfit ──────────────────────────────────────────────
    function openDeleteModal()  { document.getElementById('deleteCollModal').classList.add('is-open'); }
    function closeDeleteModal() { document.getElementById('deleteCollModal').classList.remove('is-open'); }

    document.getElementById('deleteCollBtn').addEventListener('click', function () {
      closeKebab();
      openDeleteModal();
    });
    document.getElementById('deleteCollCancelBtn').addEventListener('click', closeDeleteModal);
    document.getElementById('deleteCollModal').addEventListener('click', function (e) {
      if (e.target === this) closeDeleteModal();
    });
    document.getElementById('deleteCollConfirmBtn').addEventListener('click', function () {
      const cs = getOutfits().filter(c => c.id !== collectionId);
      saveOutfits(cs);
      window.location.href = 'my-outfits.html';
    });
  </script>

  <script>
    (function () {
      var btn = document.getElementById('avatarBtn');
      var dd  = document.getElementById('avatarDropdown');
      btn.addEventListener('click', function (e) {
        e.stopPropagation();
        var open = dd.classList.toggle('is-open');
        btn.setAttribute('aria-expanded', String(open));
      });
      document.addEventListener('click', function () {
        dd.classList.remove('is-open');
        btn.setAttribute('aria-expanded', 'false');
      });
    })();
  </script>

</body>
</html>
