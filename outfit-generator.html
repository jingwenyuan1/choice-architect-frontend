<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Generator — The Choice Architect</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="results-header">
    <a href="index.html" class="results-logo">The Choice Architect</a>
    <div class="results-header-right">
      <div class="avatar-wrapper">
        <button class="avatar-btn" id="avatarBtn" aria-label="Profile menu" aria-expanded="false">

            <path d="M4 20c0-4.4 3.6-8 8-8s8 3.6 8 8"/>
          </svg>
        </button>
        <div class="avatar-dropdown" id="avatarDropdown">
          <a href="my-outfits.html" class="avatar-dropdown-item">My Outfits</a>
          <a href="my-wishlists.html" class="avatar-dropdown-item">My Wishlists</a>
          <a href="purchases.html" class="avatar-dropdown-item">My Purchases</a>
        </div>
      </div>
    </div>
  </header>

  <div class="top-half">

  <div class="outfit-detail-header">
    <div class="edit-name-container">
      <input type="text" class="cg-name-input" id="cgCollectionName" placeholder="New outfit" autocomplete="off" spellcheck="false">
      <button class="edit-name-pencil" id="editNamePencil" aria-label="Edit outfit name">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"/>
        </svg>
      </button>
    </div>
    <div class="attr-search-section">
      <span class="attr-search-label">Search a style</span>
      <input type="text" id="cgStyleInput" class="attr-search-input" placeholder="Search" autocomplete="off">
    </div>
  </div>

  <section class="products-section">
    <div class="products-scroll-wrapper" id="cgScrollWrapper">
      <div class="products-track cg-track" id="cgProductsGrid"></div>
    </div>
    <p class="cg-status-text" id="cgStatusText" aria-live="polite"></p>
  </section>

  <div class="nav-row">
    <div class="nav-row-left">
      <button class="nav-arrow-btn" id="cgPrevBtn" aria-label="Previous">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="15 18 9 12 15 6"/>

      <button class="nav-arrow-btn" id="cgNextBtn" aria-label="Redo" disabled>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="9 18 15 12 9 6"/>

    </div>
    <button class="save-changes-btn" id="saveChangesBtn">Save changes</button>
  </div>

  <div class="roll-section">
    <button class="roll-btn" id="cgGenerateBtn">GENERATE</button>
  </div>

  </div><!-- /.top-half -->

  <!-- ── Explore section (bottom half) ────────────────── -->
  <div id="exploreSection" class="explore-section">
    <button class="back-to-top-btn" id="backToTopBtn">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="18 15 12 9 6 15"/></svg>
      Back to top
    </button>
    <p class="explore-section-label">Exploring similar to</p>
    <p class="explore-section-title" id="exploreSectionTitle"></p>

    <div class="filters-row">
      <div class="price-range-section">
        <span class="price-range-label">Price range</span>
        <div class="price-inputs">
          <span class="price-label">Min</span>
          <input type="number" id="explorePriceMin" class="price-input" min="0">
          <span class="price-label">Max</span>
          <input type="number" id="explorePriceMax" class="price-input" min="0">
          <button class="price-search-btn" id="explorePriceSearchBtn" aria-label="Apply price filter">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="11" cy="11" r="8"/>
              <line x1="21" y1="21" x2="16.65" y2="16.65"/>
            </svg>
          </button>
        </div>
      </div>
    </div>

    <section class="products-section">
      <div class="products-scroll-wrapper" id="exploreScrollWrapper">
        <div class="products-track" id="exploreGrid">
          <p class="no-results" id="exploreNoResults" style="display:none;">Loading…</p>

    <div class="nav-row">
      <div class="nav-row-left">

            <polyline points="15 18 9 12 15 6"/>
          </svg>
        </button>
        <button class="nav-arrow-btn" id="exploreNextBtn" aria-label="Redo" disabled>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="9 18 15 12 9 6"/>
          </svg>
        </button>
      </div>
    </div>

    <div class="roll-section">
      <button class="roll-btn" id="exploreRollBtn">ROLL</button>
    </div>
  </div>

  <!-- ── Conflict resolution modal ───────────────── -->
  <div class="save-modal-overlay" id="conflictModal" role="dialog" aria-modal="true">
    <div class="save-modal-box" id="conflictModalBox"></div>
  </div>

  <!-- ── Save modal ──────────────────────────────── -->
  <div class="save-modal-overlay" id="saveModal" role="dialog" aria-modal="true">
    <div class="save-modal-box">
      <h2 class="save-modal-title">Save</h2>

      <div class="save-tabs" id="saveTabs">
        <button class="save-tab is-active" data-tab="outfit">Outfit</button>
        <button class="save-tab" data-tab="wishlist">Wishlist</button>
        <span class="save-tab-indicator"></span>
      </div>

      <div class="save-tab-panel is-active" data-panel="outfit">
        <div class="save-modal-input-row">
          <input type="text" id="saveOutfitInput" class="save-modal-input" placeholder="New outfit name" autocomplete="off">
          <button class="save-modal-add-btn" id="saveOutfitAddBtn" aria-label="Add outfit">
            <svg width="12" height="12" viewBox="0 0 12 12" fill="none" aria-hidden="true">
              <line x1="1" y1="6" x2="11" y2="6" stroke="#fffaf5" stroke-width="1.5" stroke-linecap="round"/>
              <line x1="6" y1="1" x2="6" y2="11" stroke="#fffaf5" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
          </button>
        </div>
        <div class="save-modal-list" id="listOutfit"></div>
      </div>

      <div class="save-tab-panel" data-panel="wishlist">
        <div class="save-modal-input-row">
          <input type="text" id="saveWishlistInput" class="save-modal-input" placeholder="New wishlist name" autocomplete="off">
          <button class="save-modal-add-btn" id="saveWishlistAddBtn" aria-label="Add wishlist">
            <svg width="12" height="12" viewBox="0 0 12 12" fill="none" aria-hidden="true">
              <line x1="1" y1="6" x2="11" y2="6" stroke="#fffaf5" stroke-width="1.5" stroke-linecap="round"/>
              <line x1="6" y1="1" x2="6" y2="11" stroke="#fffaf5" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
          </button>
        </div>
        <div class="save-modal-list" id="listWishlist"></div>
      </div>

      <div class="save-modal-actions">
        <button class="save-modal-cancel-btn" id="saveModalCancel">Cancel</button>
        <button class="save-modal-confirm-btn" id="saveModalSave">Save</button>
      </div>
    </div>
  </div>

  <script>
    const API_BASE      = 'https://choice-architect-server-production.up.railway.app';
    const SIMILARITY_K  = 200;
    const CATEGORIES = ['Tops', 'Bottoms', 'Outerwear', 'Shoes', 'Jewelry', 'Bags', 'Other'];

    const CATEGORY_QUERY = {
      'Tops':      't-shirt tank top long sleeve shirt sweater sweatshirt pullover top blouse polo tee hoodie',
      'Bottoms':   'pants jeans shorts skirt leggings trousers joggers sweatpants chinos culottes bermuda capris',
      'Outerwear': 'jacket coat blazer parka cardigan windbreaker vest',
      'Shoes':     'shoes sneakers boots heels sandals loafers',
      'Jewelry':   'necklace earrings bracelet ring jewelry',
      'Bags':      'handbag tote bag backpack purse clutch',
      'Other':     'fashion accessory hat belt scarf sunglasses',
    };

    // Returns the most category-specific search query for a product.
    function getCategoryQueryForProduct(product) {
      if (!product) return '';
      const cat  = (product.category || '').toLowerCase().trim();
      const name = (product.name   || '').toLowerCase();
      // Exact key match (e.g. slot.category === 'Tops')
      if (CATEGORY_QUERY[product.category]) return CATEGORY_QUERY[product.category];
      // Category field contains a keyword from one of our buckets
      if (cat) {
        for (const q of Object.values(CATEGORY_QUERY)) {
          if (q.split(' ').some(kw => cat.includes(kw) || kw.includes(cat))) return q;
        }
        return cat; // use raw category as query (e.g. "dress", "kimono")
      }
      // Scan product name for known clothing keywords
      for (const q of Object.values(CATEGORY_QUERY)) {
        if (q.split(' ').some(kw => name.includes(kw))) return q;
      }
      return product.name.split(/\s+/).slice(0, 3).join(' ');
    }

    // Returns a specific query for a slot that preserves the product's exact type.
    // Uses the broad CATEGORY_QUERY bucket only for user-selected picker categories;
    // for all other slots (e.g. unlocked collection products) uses the raw product.category
    // field so a shirt stays a shirt rather than being replaced by any top.
    function getSpecificQuery(slot) {
      if (!slot) return '';
      if (CATEGORY_QUERY[slot.category]) return CATEGORY_QUERY[slot.category];
      const product = slot.product;
      if (!product) return '';
      if (product.category && !CATEGORY_QUERY[product.category]) return product.category;
      return product.name.split(/\s+/).slice(0, 4).join(' ');
    }

    // ── Icon SVGs ────────────────────────────────────────────────────────
    const LOCK_CLOSED_SVG = `<svg width="18" height="18" viewBox="0 0 15 26" fill="none" aria-hidden="true"><rect x="0" y="11" width="15" height="13" rx="1.5" fill="#efeee6"/><path d="M2.5,13 L2.5,8 A5,5 0 0 1 12.5,8 L12.5,12.5" stroke="#efeee6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
    const LOCK_OPEN_SVG   = `<svg width="18" height="18" viewBox="0 0 15 26" fill="none" aria-hidden="true"><rect x="0" y="11" width="15" height="13" rx="1.5" fill="#efeee6"/><path d="M2.5,7 A5,5 0 0 1 12.5,8 L12.5,12.5" stroke="#efeee6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
    const STAR_SVG        = `<svg width="11" height="11" viewBox="0 0 24 24" fill="currentColor" stroke="none"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>`;
    // Save icon — outline bookmark, 20×20
    const SAVE_SVG        = `<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>`;
    // Filled save icon — used for the persistent badge when slot is saved
    const SAVE_SVG_FILLED = `<svg width="17" height="17" viewBox="0 0 24 24" fill="currentColor" stroke="none"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>`;
    const SEARCH_SVG      = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#1E1A0B" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>`;
    const ADD_ICON_SVG    = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#1E1A0B" stroke-width="2" stroke-linecap="round" aria-hidden="true"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>`;


    // ── Outfits helpers ──────────────────────────────────────────────
    function getOutfits() {
      return JSON.parse(localStorage.getItem('tca_outfits') || '[]');
    }
    function saveOutfits(cs) {
      localStorage.setItem('tca_outfits', JSON.stringify(cs));
    }
    function getWishlists() {
      return JSON.parse(localStorage.getItem('tca_wishlists') || '[]');
    }
    function saveWishlists(ws) {
      localStorage.setItem('tca_wishlists', JSON.stringify(ws));
    }

    // ── Tag field helpers (mirrors search.html) ──────────────────────────
    function getTagFieldValues(tags, field) {
      if (!tags) return [];
      if (field === 'color')    { const v = tags.color;   return Array.isArray(v) ? v : (v ? [v] : []); }
      if (field === 'material') return tags.material ? [tags.material] : [];
      if (field === 'pattern')  return tags.pattern  ? [tags.pattern]  : [];
      if (field === 'occasion') { const v = tags.occasion; return Array.isArray(v) ? v : (v ? [v] : []); }
      if (field === 'design')   { const d = tags.design; return Array.isArray(d) ? d : (typeof d === 'string' ? [d] : []); }
      if (field.startsWith('design.')) {
        const sub = field.slice(7), d = tags.design;
        if (!d || typeof d !== 'object' || Array.isArray(d)) return [];
        const v = d[sub]; return Array.isArray(v) ? v : (v ? [v] : []);
      }
      return [];
    }

    function satisfiesTagConstraints(product, constraints) {
      for (const [field, allowed] of Object.entries(constraints)) {
        const vals = getTagFieldValues(product.tags || {}, field);
        if (!vals.some(v => allowed.has(v))) return false;
      }
      return true;
    }

    function getCGTagConstraints() {
      const c = {};
      slots.forEach((slot, i) => {
        if (!slot.product || !slot.product.tags || !slotTagLocks[i]) return;
        Object.entries(slotTagLocks[i]).forEach(([field, locked]) => {
          if (!locked) return;
          getTagFieldValues(slot.product.tags, field).forEach(v => {
            if (!c[field]) c[field] = new Set();
            c[field].add(v);
          });
        });
      });
      return c;
    }

    function getExploreTagConstraints() {
      const c = {};
      exploreSlotProducts.forEach((p, i) => {
        if (!p || !p.tags || !exploreSlotTagLocks[i]) return;
        Object.entries(exploreSlotTagLocks[i]).forEach(([field, locked]) => {
          if (!locked) return;
          getTagFieldValues(p.tags, field).forEach(v => {
            if (!c[field]) c[field] = new Set();
            c[field].add(v);
          });
        });
      });
      return c;
    }

    // ── Shared tag-rows builder (used by all card builders) ──────────────
    function buildTagRows(product, tagLockState, lockBtnClass) {
      const t = product && product.tags;
      if (!t || typeof t !== 'object') return '';
      const _DESIGN_LABEL = {
        fit: 'Fit', length: 'Length', sleeve_length: 'Sleeve Length',
        neckline: 'Neckline', rise: 'Rise',
        heel_height: 'Heel Height', heel_type: 'Heel Type',
      };
      const lock = tagLockState || {};
      const btn = field => {
        const on = !!lock[field];
        return `<button class="icon-btn ${lockBtnClass}" data-tag-field="${field}" aria-label="${on ? 'Unlock' : 'Lock'}">${on ? LOCK_CLOSED_SVG : LOCK_OPEN_SVG}</button>`;
      };
      // Build ordered list of attrs: Color, Material, Design fields, Pattern, Occasion
      const attrs = [];
      if (t.color) {
        const vals = Array.isArray(t.color) ? t.color : [t.color];
        if (vals.length) attrs.push({ label: 'Color', value: vals.join(', '), field: 'color' });
      }
      if (t.material) {
        const m = t.material;
        attrs.push({ label: 'Material', value: m.charAt(0).toUpperCase() + m.slice(1), field: 'material' });
      }
      const d = t.design;
      if (d) {
        if (typeof d === 'object' && !Array.isArray(d)) {
          for (const [k, v] of Object.entries(d)) {
            const field = 'design.' + k;
            const label = _DESIGN_LABEL[k] || (k.charAt(0).toUpperCase() + k.slice(1).replace(/_/g, ' '));
            const vals  = Array.isArray(v) ? v : [v];
            attrs.push({ label, value: vals.join(', '), field });
          }
        } else if (Array.isArray(d)) {
          attrs.push({ label: 'Design', value: d.join(', '), field: 'design' });
        } else if (typeof d === 'string') {
          attrs.push({ label: 'Design', value: d, field: 'design' });
        }
      }
      if (t.pattern) {
        attrs.push({ label: 'Pattern', value: t.pattern, field: 'pattern' });
      }
      if (t.occasion) {
        const vals = Array.isArray(t.occasion) ? t.occasion : [t.occasion];
        if (vals.length) attrs.push({ label: 'Occasion', value: vals.join(', '), field: 'occasion' });
      }

      const MAX_VISIBLE = 5;
      const parts = [];

      if (attrs.length <= MAX_VISIBLE) {
        // Bottom-anchor: pad top with empty rows
        const emptyCount = MAX_VISIBLE - attrs.length;
        for (let i = 0; i < emptyCount; i++) {
          parts.push(`<div class="attr-row-empty"><div class="attr-label">&nbsp;</div><div class="attr-value-row"><span class="attr-value">&nbsp;</span></div></div>`);
          parts.push(`<div class="attr-divider"></div>`);
        }
      }

      attrs.forEach((attr, i) => {
        if (i === 0 && attrs.length > MAX_VISIBLE) {
          // No leading divider when scrollable
        } else if (i === 0 && attrs.length <= MAX_VISIBLE) {
          // Leading divider already handled by empty rows or none needed
        } else {
          // Divider between attrs (already appended after each empty row above)
        }
        parts.push(`<div class="attr-row">
          <div class="attr-label">${attr.label}</div>
          <div class="attr-value-row">
            <span class="attr-value">${attr.value}</span>
            ${btn(attr.field)}
          </div>
        </div>`);
        if (i < attrs.length - 1) {
          parts.push(`<div class="attr-divider"></div>`);
        }
      });

      return parts.join('');
    }

    // ── State ────────────────────────────────────────────────────────────
    let collectionId  = '';
    let slots         = [];
    let savedSlots    = [];   // parallel to slots: true = saved to current collection
    let slotTagLocks  = [];   // per-slot {field: boolean} for attribute locks
    let genHistory    = [];
    let genRedoHistory = [];
    let isFading      = false;
    let isExploreFading = false;
    let hasGenerated  = false;

    // ── Explore section state ────────────────────────────────────────────
    let exploreSourceSlotIdx   = null;
    let exploreBaseProduct     = null;
    let exploreRankedResults   = [];
    let exploreFilteredResults = [];
    let exploreSlotProducts    = [null, null, null, null, null];
    let exploreSlotLocked      = [false, false, false, false, false];
    let exploreSlotTagLocks    = [{}, {}, {}, {}, {}];
    let exploreNextIndex       = 0;
    let exploreRollHistory     = [];
    let exploreRedoHistory     = [];

    // ── Init ─────────────────────────────────────────────────────────────
    function loadFromPreloadOrCollection(coll) {
      let products = Array.isArray(coll.products) ? coll.products : [];
      try {
        const raw = localStorage.getItem('generatorProducts');
        if (raw) {
          localStorage.removeItem('generatorProducts');
          const preloadProducts = JSON.parse(raw);
          if (Array.isArray(preloadProducts) && preloadProducts.length > 0) {
            products = preloadProducts;
          }
        }
      } catch {}
      slots        = products.slice(0, 5).map(p => ({ type: 'locked', product: p }));
      savedSlots   = slots.map((_, i) => i === 0);
      slotTagLocks = slots.map(() => ({}));
      genHistory   = [];
      genRedoHistory = [];
      hasGenerated = false;
      syncRedoBtn();
    }

    function showGrid() {
      document.getElementById('cgProductsGrid').style.opacity = '1';
    }

    async function fetchMissingTagsForSlots() {
      const missing = slots.filter(s => s.type === 'locked' && s.product && !s.product.tags);
      if (!missing.length) return;
      try {
        const pids = missing.map(s => s.product.id).join(',');
        const resp = await fetch(`${API_BASE}/tags?pids=${encodeURIComponent(pids)}`);
        const tagMap = await resp.json();
        let updated = false;
        missing.forEach(s => {
          const t = tagMap[s.product.id];
          if (t && Object.keys(t).length > 0) { s.product.tags = t; updated = true; }
        });
        if (updated) renderAll();
      } catch (err) { console.error('fetchMissingTagsForSlots:', err); }
    }

    (function init() {
      const params = new URLSearchParams(window.location.search);
      collectionId  = params.get('collection') || '';

      const cs   = getOutfits();
      const coll = cs.find(c => c.id === collectionId);
      if (!coll) { window.location.href = 'my-outfits.html'; return; }

      const cgInput = document.getElementById('cgCollectionName');
      cgInput.value = coll.name || '';
      document.title = (coll.name || 'New outfit') + ' — The Choice Architect';

      document.getElementById('cgProductsGrid').style.opacity = '0';
      loadFromPreloadOrCollection(coll);
      try { renderAll(); } catch (err) { console.error('renderAll error:', err); }
      requestAnimationFrame(() => requestAnimationFrame(showGrid));
      fetchMissingTagsForSlots();
    })();

    // Re-initialize when restored from bfcache so stale generator state is never shown
    window.addEventListener('pageshow', function (e) {
      if (!e.persisted) return;
      const cs   = getOutfits();
      const coll = cs.find(c => c.id === collectionId);
      if (!coll) return;
      loadFromPreloadOrCollection(coll);
      try { renderAll(); } catch (err) { console.error('renderAll error:', err); }
      showGrid();
      fetchMissingTagsForSlots();
    });

    function newPickerSlot() {
      return { type: 'picker', category: null, product: null,
               locked: false, resultsCache: null, lastQuery: null, resultIdx: 0 };
    }

    // ── Render (top section) ─────────────────────────────────────────────
    function renderAll(animate) {
      const grid = document.getElementById('cgProductsGrid');
      grid.innerHTML = '';

      let lastPickerIdx = -1;
      for (let i = slots.length - 1; i >= 0; i--) {
        if (slots[i].type === 'picker') { lastPickerIdx = i; break; }
      }

      slots.forEach((slot, i) => {
        const isSaved = savedSlots[i] || false;
        const tmp = document.createElement('div');
        let isCard = false;
        if (slot.type === 'locked') {
          tmp.innerHTML = buildLockedCardHTML(slot.product, i, isSaved, slotTagLocks[i] || {}).trim();
          isCard = true;
        } else if (slot.product) {
          tmp.innerHTML = buildGeneratedCardHTML(slot.product, i, slot.locked, isSaved, slotTagLocks[i] || {}).trim();
          isCard = true;
        } else {
          const canAdd  = slots.length < 5;
          tmp.innerHTML = buildPickerHTML(slot, i, canAdd).trim();
        }
        const el = tmp.firstElementChild;

      exploreSlotProducts.forEach((product, i) => {

        tmp.innerHTML = buildExploreCardHTML(product, i, exploreSlotLocked[i], exploreSlotTagLocks[i] || {}).trim();

    // ── GENERATE ─────────────────────────────────────────────────────────
    function fadeOutChanging(indices) {
      const grid = document.getElementById('cgProductsGrid');
      grid.querySelectorAll(':scope > [data-slot-idx]').forEach(el => {
        if (indices.has(parseInt(el.dataset.slotIdx, 10))) {
          el.style.transition = 'opacity 350ms linear';
          el.style.opacity    = '0';
        }
      });
    }

    // ── GENERATE ─────────────────────────────────────────────────────────
    async function doGenerate() {
      if (isFading) return;

      // Only fill unlocked picker slots that have a category selected
      const toFill = slots
        .map((slot, i) => ({ slot, i }))
        .filter(({ slot }) => slot.type === 'picker' && !slot.locked && slot.category);

      if (toFill.length === 0) return;

      isFading = true;
      const changingIndices = new Set(toFill.map(({ i }) => i));
      fadeOutChanging(changingIndices);
      hasGenerated = true;

      genHistory.push(JSON.parse(JSON.stringify(
        slots.map(s => ({ ...s, resultsCache: null }))
      )));
      if (genHistory.length > 50) genHistory.shift();
      genRedoHistory = [];
      syncRedoBtn();

      const pinnedIds = new Set(
        slots.filter(s => s.locked && s.product).map(s => s.product.id)
      );
      // Also pin products currently shown in picker slots so generate always picks something new
      toFill.forEach(({ slot }) => { if (slot.product) pinnedIds.add(slot.product.id); });

      const styleQuery = document.getElementById('cgStyleInput').value.trim();

      // Wait for fade-out to complete before issuing fetches
      await new Promise(r => setTimeout(r, 350));

      try {
        // Fetch results for all slots in parallel; each slot gets its own try-catch
        await Promise.all(toFill.map(async ({ slot }) => {
          const baseQuery = CATEGORY_QUERY[slot.category];
          if (!baseQuery) return;
          const q = (styleQuery ? styleQuery + ' ' + baseQuery : baseQuery).toLowerCase();
          try {
            const resp = await fetch(`${API_BASE}/search?q=${encodeURIComponent(q)}&k=200`);
            if (!resp.ok) return;
            const results = await resp.json();
            const pool = results.filter(p => !pinnedIds.has(p.id));
            if (pool.length === 0) return;
            const pick = pool[Math.floor(Math.random() * pool.length)];
            slot.product = pick;
            pinnedIds.add(pick.id);
          } catch {
            // Keep existing product if fetch fails; slot stays visible
          }
        }));
      } finally {
        try { renderAll(changingIndices); } catch (e) { console.error('renderAll failed:', e); }
        setTimeout(() => { isFading = false; }, 700);
      }
    }

    function syncRedoBtn() {
      const btn = document.getElementById('cgNextBtn');
      if (btn) btn.disabled = genRedoHistory.length === 0;
    }

    function syncExploreRedoBtn() {
      const btn = document.getElementById('exploreNextBtn');
      if (btn) btn.disabled = exploreRedoHistory.length === 0;
    }

    async function doUndo() {
      if (genHistory.length === 0 || isFading) return;
      isFading = true;

      // Mutate stacks and update button SYNCHRONOUSLY before any await
      const snap = genHistory.pop();
      genRedoHistory.push(JSON.parse(JSON.stringify(slots.map(s => ({ ...s, resultsCache: null })))));
      syncRedoBtn();

      const changingIndices = new Set(slots.map((_, i) => i));
      fadeOutChanging(changingIndices);
      await new Promise(r => setTimeout(r, 350));

      snap.forEach((s, i) => {
        if (slots[i]) {
          slots[i].category  = s.category;
          slots[i].product   = s.product;
          slots[i].locked    = s.locked;
          slots[i].resultIdx = s.resultIdx;
        }
      });
      renderAll(changingIndices);
      setTimeout(() => { isFading = false; }, 700);
    }

    async function doRedo() {
      if (genRedoHistory.length === 0 || isFading) return;
      isFading = true;

      // Mutate stacks and update button SYNCHRONOUSLY before any await
      const snap = genRedoHistory.pop();
      genHistory.push(JSON.parse(JSON.stringify(slots.map(s => ({ ...s, resultsCache: null })))));
      syncRedoBtn();

      const changingIndices = new Set(slots.map((_, i) => i));
      fadeOutChanging(changingIndices);
      await new Promise(r => setTimeout(r, 350));

      snap.forEach((s, i) => {

    // ── Explore MORE — open bottom half ─────────────────────────────────
    async function openExploreSection(slotIdx) {
      const slot    = slots[slotIdx];
      const product = slot && (slot.product || (slot.type === 'locked' ? slot.product : null));
      if (!product) return;

      exploreSourceSlotIdx = slotIdx;
      exploreBaseProduct   = product;

      // Set title
      document.getElementById('exploreSectionTitle').textContent = product.name;

      // Seed explore grid: product in slot 0 (locked), rest empty for now
      exploreSlotProducts  = [product, null, null, null, null];
      exploreSlotLocked    = [true, false, false, false, false];
      exploreSlotTagLocks  = [{}, {}, {}, {}, {}];
      exploreRollHistory   = [];
      exploreRedoHistory   = [];
      exploreNextIndex     = 0;
      syncExploreRedoBtn();
      renderExploreSlots();

      // Show section
      const section = document.getElementById('exploreSection');
      section.classList.add('is-visible');

      // Scroll to the explore section
      requestAnimationFrame(() => {
        section.scrollIntoView({ behavior: 'smooth', block: 'start' });
      });

      // Fetch same-category products
      await fetchExploreProducts();
    }

    async function fetchExploreProducts() {
      if (!exploreBaseProduct) return;
      const pid = exploreBaseProduct.id;
      try {
        const url  = `${API_BASE}/search_by_image?url=${encodeURIComponent(exploreBaseProduct.image_url)}&k=200`;
        const resp = await fetch(url);
        if (!resp.ok) throw new Error('Server ' + resp.status);
        const data = await resp.json();
        exploreRankedResults   = data;
        exploreFilteredResults = data.filter(p => p.id !== pid);
        // Shuffle so initial fill is random, not always the top-similarity products
        const pool = [...exploreFilteredResults];
        for (let i = pool.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [pool[i], pool[j]] = [pool[j], pool[i]];
        }
        exploreSlotProducts = [
          exploreBaseProduct,
          pool[0] || null, pool[1] || null, pool[2] || null, pool[3] || null,
        ];
        exploreNextIndex = Math.min(4, exploreFilteredResults.length);
        renderExploreSlots();
      } catch (err) {
        const el = document.getElementById('exploreNoResults');
        el.style.display = 'block';
        el.textContent   = 'Could not load similar products.';
      }
    }

    // ── Explore price filter ─────────────────────────────────────────────
    async function applyExplorePriceFilter() {
      const min = parseFloat(document.getElementById('explorePriceMin').value);
      const max = parseFloat(document.getElementById('explorePriceMax').value);
      exploreFilteredResults = exploreRankedResults.filter(p => {
        if (p.id === (exploreBaseProduct && exploreBaseProduct.id)) return false;
        const price = p.price != null ? Number(p.price) : null;
        if (price === null) return true;
        if (!isNaN(min) && price < min) return false;
        if (!isNaN(max) && price > max) return false;
        return true;
      });
      exploreSlotProducts = [
        exploreBaseProduct,
        exploreFilteredResults[0] || null,
        exploreFilteredResults[1] || null,
        exploreFilteredResults[2] || null,
        exploreFilteredResults[3] || null,
      ];
      exploreSlotLocked    = [true, false, false, false, false];
      exploreSlotTagLocks  = [{}, {}, {}, {}, {}];
      exploreNextIndex     = Math.min(4, exploreFilteredResults.length);
      exploreRollHistory  = [];
      exploreRedoHistory  = [];
      syncExploreRedoBtn();
      renderExploreSlots();
    }

    // ── Explore roll ─────────────────────────────────────────────────────
    async function doExploreRoll() {
      if (exploreFilteredResults.length === 0 || isExploreFading) return;

      const slotsToReplace = new Set(
        exploreSlotProducts.reduce((acc, p, i) => { if (p && !exploreSlotLocked[i]) acc.push(i); return acc; }, [])
      );
      if (slotsToReplace.size === 0) return;
      isExploreFading = true;

      // New roll clears redo history synchronously
      exploreRedoHistory = [];
      syncExploreRedoBtn();

      const grid = document.getElementById('exploreGrid');
      grid.querySelectorAll('.product-card').forEach(el => {
        if (slotsToReplace.has(parseInt(el.dataset.slot, 10))) {
          el.style.transition = 'opacity 350ms linear';
          el.style.opacity    = '0';
        }
      });
      await new Promise(r => setTimeout(r, 350));

      exploreRollHistory.push({
        exploreSlotProducts:  [...exploreSlotProducts],
        exploreSlotLocked:    [...exploreSlotLocked],
        exploreSlotTagLocks:  exploreSlotTagLocks.map(o => ({...o})),
        exploreNextIndex,
      });
      if (exploreRollHistory.length > 50) exploreRollHistory.shift();

      const lockedProds = exploreSlotProducts.filter((p, i) => exploreSlotLocked[i] && p);
      const baseIds = new Set(exploreFilteredResults.map(p => p.id));
      const constraints = getExploreTagConstraints();
      const hasConstraints = Object.keys(constraints).length > 0;

      let candidates;
      try {
        if (lockedProds.length > 0) {
          // Visual similarity from locked products
          const fetches = lockedProds.map(p =>
            fetch(`${API_BASE}/search_by_image?url=${encodeURIComponent(p.image_url)}&k=${SIMILARITY_K}`)
              .then(r => r.json()).catch(() => [])
          );
          const results = await Promise.all(fetches);
          const seen = new Set(); candidates = [];
          for (const arr of results) for (const p of arr) {
            if (!seen.has(p.id)) { seen.add(p.id); candidates.push(p); }
          }
          candidates = candidates.filter(p => baseIds.has(p.id));
        } else {
          candidates = [...exploreFilteredResults];
        }

        const lockedIds = new Set(lockedProds.map(p => p.id));
        candidates = candidates.filter(p => !lockedIds.has(p.id));

        // Shuffle
        for (let i = candidates.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [candidates[i], candidates[j]] = [candidates[j], candidates[i]];
        }

        let pool = hasConstraints
          ? candidates.filter(p => satisfiesTagConstraints(p, constraints))
          : candidates;

        if (pool.length < slotsToReplace.size && hasConstraints) {
          // Partial fallback: relax constraints one field at a time
          const fields = Object.keys(constraints);
          for (let drop = 1; drop <= fields.length && pool.length < slotsToReplace.size; drop++) {
            const relaxed = {...constraints};
            fields.slice(-drop).forEach(f => delete relaxed[f]);
            pool = Object.keys(relaxed).length > 0
              ? candidates.filter(p => satisfiesTagConstraints(p, relaxed))
              : candidates;
          }
        }

        pool = pool.slice(0, slotsToReplace.size);

        let poolIdx = 0;
        exploreSlotProducts = exploreSlotProducts.map((p, i) => {
          if (slotsToReplace.has(i) && poolIdx < pool.length) return pool[poolIdx++];
          return p;
        });
      } finally {
        renderExploreSlots(slotsToReplace);
        setTimeout(() => { isExploreFading = false; }, 700);
      }
    }

    async function doExploreUndo() {
      if (exploreRollHistory.length === 0 || isExploreFading) return;
      isExploreFading = true;

      // Mutate stacks and update button SYNCHRONOUSLY before any await
      const snap = exploreRollHistory.pop();
      exploreRedoHistory.push({
        exploreSlotProducts:  [...exploreSlotProducts],
        exploreSlotLocked:    [...exploreSlotLocked],
        exploreSlotTagLocks:  exploreSlotTagLocks.map(o => ({...o})),
        exploreNextIndex,
      });
      syncExploreRedoBtn();

      const grid = document.getElementById('exploreGrid');
      grid.querySelectorAll('.product-card').forEach(el => {
        el.style.transition = 'opacity 350ms linear';
        el.style.opacity    = '0';
      });
      await new Promise(r => setTimeout(r, 350));

      exploreSlotProducts  = snap.exploreSlotProducts;
      exploreSlotLocked    = snap.exploreSlotLocked;
      exploreSlotTagLocks  = snap.exploreSlotTagLocks;
      exploreNextIndex     = snap.exploreNextIndex;
      renderExploreSlots();
      setTimeout(() => { isExploreFading = false; }, 700);
    }

    async function doExploreRedo() {
      if (exploreRedoHistory.length === 0 || isExploreFading) return;
      isExploreFading = true;

      // Mutate stacks and update button SYNCHRONOUSLY before any await
      const snap = exploreRedoHistory.pop();
      exploreRollHistory.push({
        exploreSlotProducts:  [...exploreSlotProducts],
        exploreSlotLocked:    [...exploreSlotLocked],
        exploreSlotTagLocks:  exploreSlotTagLocks.map(o => ({...o})),
        exploreNextIndex,
      });
      syncExploreRedoBtn();

      const grid = document.getElementById('exploreGrid');
      grid.querySelectorAll('.product-card').forEach(el => {
        el.style.transition = 'opacity 350ms linear';
        el.style.opacity    = '0';
      });
      await new Promise(r => setTimeout(r, 350));

      exploreSlotProducts  = snap.exploreSlotProducts;
      exploreSlotLocked    = snap.exploreSlotLocked;
      exploreSlotTagLocks  = snap.exploreSlotTagLocks;
      exploreNextIndex     = snap.exploreNextIndex;
      renderExploreSlots();
      setTimeout(() => { isExploreFading = false; }, 700);
    }

    // ── ADD PRODUCT — replace top slot and scroll back up ────────────────
    function addProductFromExplore(exploreSlotIdx) {
      const product = exploreSlotProducts[exploreSlotIdx];
      if (!product || exploreSourceSlotIdx === null) return;

      const topSlot = slots[exploreSourceSlotIdx];
      if (!topSlot) return;

      // If the source slot was locked (original collection product), convert it
      // to a picker slot so it can hold the new product
      if (topSlot.type === 'locked') {
        topSlot.type         = 'picker';
        topSlot.category     = product.category || null;
        topSlot.resultsCache = null;
        topSlot.lastQuery    = null;
        topSlot.resultIdx    = 0;
      }

      topSlot.product = product;
      topSlot.locked  = false;
      savedSlots[exploreSourceSlotIdx] = (exploreSourceSlotIdx === 0);

      renderAll();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // ── Event delegation — top section ───────────────────────────────────
    document.getElementById('cgProductsGrid').addEventListener('click', function (e) {

      // Category row selection
      const catRow = e.target.closest('.picker-cat-row');
      if (catRow) {
        const idx = parseInt(catRow.dataset.slotIdx, 10);
        const cat = catRow.dataset.cat;
        slots[idx].category = slots[idx].category === cat ? null : cat;
        slots[idx].resultsCache = null;
        slots[idx].resultIdx    = 0;
        renderAll();
        return;
      }

      // Add picker slot (+)
      const addBtn = e.target.closest('.picker-add-btn');
      if (addBtn) {
        e.stopPropagation();
        const idx = parseInt(addBtn.dataset.slotIdx, 10);
        slots.splice(idx + 1, 0, newPickerSlot());
        savedSlots.splice(idx + 1, 0, false);
        slotTagLocks.splice(idx + 1, 0, {});
        renderAll();
        return;
      }

      // Dismiss generated product
      const dismissBtn = e.target.closest('.cg-dismiss-btn');
      if (dismissBtn) {
        e.stopPropagation();
        const idx = parseInt(dismissBtn.dataset.slotIdx, 10);
        slots.splice(idx, 1);
        savedSlots.splice(idx, 1);
        slotTagLocks.splice(idx, 1);
        if (slots.length === 0) {
          slots.push(newPickerSlot()); savedSlots.push(false); slotTagLocks.push({});
        }
        if (savedSlots.length > 0) savedSlots[0] = true;
        renderAll();
        return;
      }

      // Insert new picker slot from gap + button
      const insertBtn = e.target.closest('.cg-slot-insert-btn');
      if (insertBtn) {
        e.stopPropagation();
        const afterIdx = parseInt(insertBtn.dataset.insertAfter, 10);
        slots.splice(afterIdx + 1, 0, newPickerSlot());
        savedSlots.splice(afterIdx + 1, 0, false);
        slotTagLocks.splice(afterIdx + 1, 0, {});
        renderAll();
        return;
      }

      // Tag attribute lock (main section)
      const cgTagLockBtn = e.target.closest('.cg-tag-lock-btn');
      if (cgTagLockBtn) {
        e.stopPropagation();
        const card  = cgTagLockBtn.closest('[data-slot-idx]');
        const idx   = parseInt(card.dataset.slotIdx, 10);
        const field = cgTagLockBtn.dataset.tagField;
        if (!slotTagLocks[idx]) slotTagLocks[idx] = {};
        slotTagLocks[idx][field] = !slotTagLocks[idx][field];
        // Auto-lock slot when attribute is locked
        if (slotTagLocks[idx][field] && slots[idx]) slots[idx].locked = true;
        renderAll(false);
        return;
      }

      // Lock / unlock generated slot
      const lockBtn = e.target.closest('.cg-lock-btn');
      if (lockBtn) {
        e.stopPropagation();
        const idx = parseInt(lockBtn.dataset.slotIdx, 10);
        if (slots[idx] && slots[idx].type === 'picker') {
          slots[idx].locked = !slots[idx].locked;
          renderAll();
        }
        return;
      }

      // Unlock a collection-locked slot (convert to editable)
      const lockedUnlockBtn = e.target.closest('.cg-locked-unlock-btn');
      if (lockedUnlockBtn) {
        e.stopPropagation();
        const idx = parseInt(lockedUnlockBtn.dataset.slotIdx, 10);
        const slot = slots[idx];
        if (slot && slot.type === 'locked') {
          slot.type        = 'picker';
          slot.category    = slot.product ? (slot.product.category || null) : null;
          slot.locked      = false;
          slot.resultsCache = null;
          slot.lastQuery   = null;
          slot.resultIdx   = 0;
          renderAll();
        }
        return;
      }

      // Save button — open modal
      const saveBtn = e.target.closest('.cg-save-btn');
      if (saveBtn) {
        e.stopPropagation();
        const idx = parseInt(saveBtn.dataset.slotIdx, 10);
        const slot = slots[idx];
        if (!slot) return;
        const product = slot.type === 'locked' ? slot.product : slot.product;
        if (product) openSaveModal(product, idx);
        return;
      }

      // Search icon button (Explore More)
      const exploreBtn = e.target.closest('.search-icon-btn');
      if (exploreBtn) {
        e.stopPropagation();
        const idx = parseInt(exploreBtn.dataset.slotIdx, 10);
        openExploreSection(idx);
        return;
      }
    });

    // ── Event delegation — explore section ───────────────────────────────
    document.getElementById('exploreGrid').addEventListener('click', function (e) {

      // Lock / unlock explore slot
      const lockBtn = e.target.closest('.cg-explore-lock-btn');
      if (lockBtn) {
        e.stopPropagation();
        const slotIdx = parseInt(lockBtn.dataset.slot, 10);
        exploreSlotLocked[slotIdx] = !exploreSlotLocked[slotIdx];
        const card = lockBtn.closest('.product-card');
        card.querySelectorAll('.cg-explore-lock-btn').forEach(btn => {
          btn.innerHTML = exploreSlotLocked[slotIdx] ? LOCK_CLOSED_SVG : LOCK_OPEN_SVG;
          btn.setAttribute('aria-label', exploreSlotLocked[slotIdx] ? 'Unlock' : 'Lock');
        });
        card.classList.toggle('is-locked', exploreSlotLocked[slotIdx]);
        return;
      }

      // Tag attribute lock (explore section)
      const exploreTagLockBtn = e.target.closest('.cg-explore-tag-lock-btn');
      if (exploreTagLockBtn) {
        e.stopPropagation();
        const card    = exploreTagLockBtn.closest('[data-slot]');
        const slotIdx = parseInt(card.dataset.slot, 10);
        const field   = exploreTagLockBtn.dataset.tagField;
        if (!exploreSlotTagLocks[slotIdx]) exploreSlotTagLocks[slotIdx] = {};
        exploreSlotTagLocks[slotIdx][field] = !exploreSlotTagLocks[slotIdx][field];

        if (exploreSlotTagLocks[slotIdx][field]) exploreSlotLocked[slotIdx] = true;

      // ADD PRODUCT (plus icon button)
      const addBtn = e.target.closest('.add-icon-btn');

      // Dismiss (X) button on explore card
      const dismissBtn = e.target.closest('.cg-explore-dismiss-btn');

        e.stopPropagation();
        const slotIdx = parseInt(dismissBtn.dataset.slot, 10);

        exploreSlotLocked[slotIdx]    = false;
        exploreSlotTagLocks[slotIdx]  = {};

      const exploreSaveBtn = e.target.closest('.cg-explore-save-btn');

        e.stopPropagation();

    // ── Drag-to-reorder (explore section) ───────────────────────────────
    document.getElementById('exploreGrid').addEventListener('mousedown', function (e) {
      const handle = e.target.closest('.dots-grid');
      if (!handle) return;
      const card = handle.closest('.product-card');
      if (!card || card.dataset.slot === undefined) return;
      e.preventDefault();
      e.stopPropagation();

      const slotIdx = parseInt(card.dataset.slot, 10);
      const rect    = card.getBoundingClientRect();

      const allCards = Array.from(document.getElementById('exploreScrollWrapper').querySelectorAll('.product-card'));
      let gapW = 16;
      for (let k = 0; k + 1 < allCards.length; k++) {
        const ra = allCards[k].getBoundingClientRect();
        const rb = allCards[k + 1].getBoundingClientRect();
        const g  = rb.left - ra.right;
        if (g >= 0) { gapW = g; break; }
      }
      const shiftW = rect.width + gapW;

      const ghost = card.cloneNode(true);
      Object.assign(ghost.style, {
        position: 'fixed', width: rect.width + 'px', height: rect.height + 'px',
        top: rect.top + 'px', left: rect.left + 'px',
        opacity: '0.88', pointerEvents: 'none', zIndex: '9999',
        transition: 'none', margin: '0',
        boxShadow: '0 8px 32px rgba(49,34,12,0.22)',
        borderRadius: 'var(--card-radius)',
      });
      document.body.appendChild(ghost);
      card.style.opacity       = '0';
      card.style.pointerEvents = 'none';
      document.body.style.userSelect = 'none';

      dndExplore = { slotIdx, dropIdx: slotIdx, ghost, card, shiftW,
                     offsetX: e.clientX - rect.left, offsetY: e.clientY - rect.top };
    });

    document.addEventListener('mousemove', function (e) {
      if (!dndExplore) return;
      dndExplore.ghost.style.left = (e.clientX - dndExplore.offsetX) + 'px';
      dndExplore.ghost.style.top  = (e.clientY - dndExplore.offsetY) + 'px';

      const cards = Array.from(document.getElementById('exploreGrid').querySelectorAll('.product-card'));
      let bestIdx = dndExplore.slotIdx, minDist = Infinity;
      cards.forEach(c => {
        const ci = parseInt(c.dataset.slot, 10);
        if (ci === dndExplore.slotIdx) return;
        const r  = c.getBoundingClientRect();
        const cx = r.left + r.width / 2;
        const dist = Math.abs(e.clientX - cx);
        if (dist < minDist) { minDist = dist; bestIdx = ci; }
      });

      if (bestIdx === dndExplore.dropIdx) return;
      dndExplore.dropIdx = bestIdx;
      cards.forEach(c => {
        const ci = parseInt(c.dataset.slot, 10);
        if (ci === dndExplore.slotIdx) return;
        c.style.transition = 'transform 0.18s ease';
        if (dndExplore.slotIdx < dndExplore.dropIdx) {
          c.style.transform = (ci > dndExplore.slotIdx && ci <= dndExplore.dropIdx)
            ? `translateX(-${dndExplore.shiftW}px)` : '';
        } else {
          c.style.transform = (ci >= dndExplore.dropIdx && ci < dndExplore.slotIdx)
            ? `translateX(${dndExplore.shiftW}px)` : '';
        }
      });
    });

    document.addEventListener('mouseup', function () {
      if (!dndExplore) return;
      const { slotIdx, dropIdx } = dndExplore;
      dndExplore.ghost.remove();
      document.getElementById('exploreGrid')
        .querySelectorAll('.product-card')
        .forEach(c => { c.style.transform = ''; c.style.transition = '';
                        c.style.opacity = ''; c.style.pointerEvents = ''; });
      document.body.style.userSelect = '';
      dndExplore = null;

      if (slotIdx !== dropIdx) {
        const reorder = arr => { const [item] = arr.splice(slotIdx, 1); arr.splice(dropIdx, 0, item); };
        reorder(exploreSlotProducts);
        reorder(exploreSlotLocked);
        reorder(exploreSlotTagLocks);
        renderExploreSlots(false);
      }
    });

    // ── Buttons + spacebar ────────────────────────────────────────────────
    // ── Save changes → update collection and navigate back ───────────────
    function saveChanges() {
      const cs   = getOutfits();
      const coll = cs.find(c => c.id === collectionId);
      if (!coll) return;
      coll.products = slots.filter(s => s.product != null).map(s => s.product);
      const nameVal = document.getElementById('cgCollectionName').value.trim();
      if (nameVal) { coll.name = nameVal; }
      else if (!coll.name) { coll.name = 'New outfit'; }
      saveOutfits(cs);
      window.location.href = 'outfit.html?id=' + encodeURIComponent(collectionId);
    }

    document.getElementById('cgNextBtn').addEventListener('click', doRedo);
    document.getElementById('cgPrevBtn').addEventListener('click', doUndo);

    document.getElementById('exploreRollBtn').addEventListener('click', doExploreRoll);
    document.getElementById('exploreNextBtn').addEventListener('click', doExploreRedo);

    document.addEventListener('keydown', function (e) {

        e.preventDefault();
        const exploreVisible = document.getElementById('exploreSection').classList.contains('is-visible');
        if (exploreVisible && window.scrollY > document.getElementById('exploreSection').offsetTop - window.innerHeight * 0.5) {
          doExploreRoll();
        } else {
          doGenerate();
        }
      }
    });

    // Dynamic placeholder for style search (random aesthetic + occasion on each load)
    (function () {
      const aesthetics = ['cottagecore','Y2K','indie','coquette','grunge','edgy','academia','minimalist','boho'];
      const occasions  = ['workout','wedding','black tie','business casual','casual','formal','semi-formal','cocktail'];
      const a = aesthetics[Math.floor(Math.random() * aesthetics.length)];
      const o = occasions[Math.floor(Math.random() * occasions.length)];
      document.getElementById('cgStyleInput').placeholder = 'e.g. “' + a + '” or “' + o + '”';
    })();

    document.getElementById('cgStyleInput').addEventListener('keydown', function (e) {
      if (e.key === 'Enter') {
        slots.forEach(s => { if (s.type === 'picker') s.resultsCache = null; });
        doGenerate();
      }
    });

    // Click-drag scroll for both wrappers
    ['cgScrollWrapper', 'exploreScrollWrapper'].forEach(function (id) {
      const scroller = document.getElementById(id);
      if (!scroller) return;
      let isDown = false, startX, scrollLeft;
      scroller.addEventListener('mousedown', function (e) {
        isDown = true; scroller.style.cursor = 'grabbing';
        startX = e.pageX - scroller.offsetLeft; scrollLeft = scroller.scrollLeft;
      });
      document.addEventListener('mouseup', function () { isDown = false; scroller.style.cursor = ''; });
      scroller.addEventListener('mouseleave', function () { isDown = false; scroller.style.cursor = ''; });
      scroller.addEventListener('mousemove', function (e) {
        if (!isDown) return;
        e.preventDefault();
        scroller.scrollLeft = scrollLeft - (e.pageX - scroller.offsetLeft - startX) * 1.2;
      });

    // ── Save modal ────────────────────────────────────────────────────────
    let currentSaveProduct  = null;
    let currentSaveSlotIdx  = null;
    let pendingOutfitIds    = new Set();
    let pendingWishlistIds  = new Set();

    const CHECK_SVG = `<svg width="14" height="14" viewBox="0 0 14 14" fill="none"><polyline points="2,7 5,10.5 12,3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
    const PLUS_SVG  = `<svg width="14" height="14" viewBox="0 0 14 14" fill="none"><line x1="7" y1="2" x2="7" y2="12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><line x1="2" y1="7" x2="12" y2="7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>`;

    function renderSaveList(listId, items, pendingIds, typeLabel) {
      const list = document.getElementById(listId);
      const fallback = typeLabel === 'outfit' ? 'New outfit' : 'New Wishlist';
      if (items.length === 0) {
        list.innerHTML = '<p class="save-modal-empty">None saved yet</p>';
        return;
      }
      list.innerHTML = items.map(item => {
        const isPending = pendingIds.has(item.id);
        const nameEsc = (item.name || fallback).replace(/&/g, '&amp;').replace(/</g, '&lt;');
        const thumb = item.products && item.products[0]
          ? `<img src="${item.products[0].image_url}" style="width:52px;height:52px;object-fit:cover;border-radius:6px;flex-shrink:0;" alt="">`
          : `<div class="save-outfit-thumb"></div>`;
        return `<div class="save-outfit-item${isPending ? ' is-pending' : ''}" data-item-id="${item.id}" data-item-type="${typeLabel}">
          ${thumb}
          <span class="save-outfit-name">${nameEsc}</span>
          ${isPending ? CHECK_SVG : PLUS_SVG}
        </div>`;
      }).join('');
    }

    function renderModalOutfits()   { renderSaveList('listOutfit',   getOutfits(),   pendingOutfitIds,   'outfit');   }
    function renderModalWishlists() { renderSaveList('listWishlist',  getWishlists(), pendingWishlistIds, 'wishlist'); }

    function switchSaveTab(tabName) {
      document.querySelectorAll('.save-tab').forEach(t =>
        t.classList.toggle('is-active', t.dataset.tab === tabName));
      document.querySelectorAll('.save-tab-panel').forEach(p =>
        p.classList.toggle('is-active', p.dataset.panel === tabName));
      document.querySelector('.save-tab-indicator').style.transform =
        tabName === 'wishlist' ? 'translateX(100%)' : 'translateX(0%)';
    }

    function openSaveModal(product, slotIdx) {
      currentSaveProduct = product || null;
      currentSaveSlotIdx = slotIdx != null ? slotIdx : null;
      pendingOutfitIds.clear();
      pendingWishlistIds.clear();
      if (product) {
        getOutfits().forEach(o => {
          if (o.products.some(p => p.id === product.id)) pendingOutfitIds.add(o.id);
        });
        getWishlists().forEach(wl => {
          if (wl.products.some(p => p.id === product.id)) pendingWishlistIds.add(wl.id);
        });
      }
      document.getElementById('saveOutfitInput').value = '';
      document.getElementById('saveWishlistInput').value = '';
      renderModalOutfits();
      renderModalWishlists();
      switchSaveTab('outfit');
      document.getElementById('saveModal').classList.add('is-open');
    }

    function closeSaveModal() {
      document.getElementById('saveModal').classList.remove('is-open');
      currentSaveProduct = null;
      currentSaveSlotIdx = null;
      pendingOutfitIds.clear();
      pendingWishlistIds.clear();
    }

    document.querySelectorAll('.save-tab').forEach(tab => {
      tab.addEventListener('click', () => switchSaveTab(tab.dataset.tab));
    });

    function createAndSave(type) {
      const inputId = type === 'outfit' ? 'saveOutfitInput' : 'saveWishlistInput';
      const input   = document.getElementById(inputId);
      const name    = input.value.trim();
      if (!name) { input.focus(); return; }
      const newId   = Date.now().toString(36) + Math.random().toString(36).slice(2);
      const newItem = { id: newId, name, products: currentSaveProduct ? [currentSaveProduct] : [] };
      if (type === 'outfit') {
        const outfits = getOutfits();
        outfits.unshift(newItem);
        saveOutfits(outfits);
        if (currentSaveProduct) pendingOutfitIds.add(newId);
        renderModalOutfits();
      } else {
        const wishlists = getWishlists();
        wishlists.unshift(newItem);
        saveWishlists(wishlists);
        if (currentSaveProduct) pendingWishlistIds.add(newId);
        renderModalWishlists();
      }
      input.value = '';
    }

    document.getElementById('saveOutfitAddBtn').addEventListener('click', () => createAndSave('outfit'));
    document.getElementById('saveWishlistAddBtn').addEventListener('click', () => createAndSave('wishlist'));

    document.getElementById('saveOutfitInput').addEventListener('keydown', function (e) {
      if (e.key === 'Enter') { e.preventDefault(); createAndSave('outfit'); }
    });
    document.getElementById('saveWishlistInput').addEventListener('keydown', function (e) {
      if (e.key === 'Enter') { e.preventDefault(); createAndSave('wishlist'); }
    });

    document.getElementById('saveModal').addEventListener('click', function (e) {
      if (e.target === this) { closeSaveModal(); return; }
      const item = e.target.closest('.save-outfit-item');
      if (!item) return;
      e.stopPropagation();
      const type = item.dataset.itemType;
      const id   = item.dataset.itemId;
      if (type === 'outfit') {
        if (pendingOutfitIds.has(id)) pendingOutfitIds.delete(id);
        else pendingOutfitIds.add(id);
        renderModalOutfits();
      } else if (type === 'wishlist') {
        if (pendingWishlistIds.has(id)) pendingWishlistIds.delete(id);
        else pendingWishlistIds.add(id);
        renderModalWishlists();
      }
    });

    document.getElementById('saveModalCancel').addEventListener('click', closeSaveModal);

    document.getElementById('saveModalSave').addEventListener('click', function () {
      const product = currentSaveProduct;
      if (!product) { closeSaveModal(); return; }

      const outfits = getOutfits();
      let outfitDirty = false;
      for (const o of outfits) {
        const has  = o.products.some(p => p.id === product.id);
        const want = pendingOutfitIds.has(o.id);
        if (want && !has) {
          o.products.push(product);
          outfitDirty = true;
          if (o.id === collectionId && currentSaveSlotIdx !== null) {
            savedSlots[currentSaveSlotIdx] = true;
            const card = document.querySelector(`#cgProductsGrid [data-slot-idx="${currentSaveSlotIdx}"]`);
            if (card) card.classList.add('is-saved');
          }
        }
        if (!want && has) {
          o.products = o.products.filter(p => p.id !== product.id);
          outfitDirty = true;
          if (o.id === collectionId && currentSaveSlotIdx !== null) {
            savedSlots[currentSaveSlotIdx] = false;
            const card = document.querySelector(`#cgProductsGrid [data-slot-idx="${currentSaveSlotIdx}"]`);
            if (card) card.classList.remove('is-saved');
          }
        }
      }
      if (outfitDirty) saveOutfits(outfits);

      const wishlists = getWishlists();
      let wlDirty = false;
      for (const wl of wishlists) {
        const has  = wl.products.some(p => p.id === product.id);
        const want = pendingWishlistIds.has(wl.id);
        if (want && !has)  { wl.products.push(product); wlDirty = true; }
        if (!want && has)  { wl.products = wl.products.filter(p => p.id !== product.id); wlDirty = true; }
      }
      if (wlDirty) saveWishlists(wishlists);

      closeSaveModal();
    });

    // ── Drag-to-reorder (top-half slots) ────────────────────────────────
    let dnd = null;

    document.getElementById('cgProductsGrid').addEventListener('mousedown', function (e) {
      const handle = e.target.closest('.dots-grid');
      if (!handle) return;
      const card = handle.closest('.product-card');
      if (!card || card.dataset.slotIdx === undefined) return;
      if (slots.some(s => !s.product)) return;
      if (document.querySelector('.picker-slot')) return;
      e.preventDefault();
      e.stopPropagation();

      const slotIdx = parseInt(card.dataset.slotIdx, 10);
      const rect    = card.getBoundingClientRect();

      const allCardsForGap = Array.from(document.getElementById('cgScrollWrapper').querySelectorAll('.product-card, .picker-slot'));
      let gapW = 16;
      for (let k = 0; k + 1 < allCardsForGap.length; k++) {
        const ra = allCardsForGap[k].getBoundingClientRect();
        const rb = allCardsForGap[k + 1].getBoundingClientRect();
        const g  = rb.left - ra.right;
        if (g >= 0) { gapW = g; break; }
      }
      const shiftW = rect.width + gapW;

      const ghost = card.cloneNode(true);
      Object.assign(ghost.style, {
        position: 'fixed', width: rect.width + 'px', height: rect.height + 'px',
        top: rect.top + 'px', left: rect.left + 'px',
        opacity: '0.88', pointerEvents: 'none', zIndex: '9999',
        transition: 'none', margin: '0',
        boxShadow: '0 8px 32px rgba(49,34,12,0.22)',
        borderRadius: 'var(--card-radius)',
      });
      document.body.appendChild(ghost);

      card.style.opacity = '0';
      card.style.pointerEvents = 'none';
      document.body.style.userSelect = 'none';

      dnd = { slotIdx, dropIdx: slotIdx, ghost, card, shiftW,
              offsetX: e.clientX - rect.left, offsetY: e.clientY - rect.top };
    });

    document.addEventListener('mousemove', function (e) {
      if (!dnd) return;
      dnd.ghost.style.left = (e.clientX - dnd.offsetX) + 'px';
      dnd.ghost.style.top  = (e.clientY - dnd.offsetY) + 'px';

      const grid  = document.getElementById('cgProductsGrid');
      const cards = Array.from(grid.querySelectorAll('.product-card, .picker-slot'));
      let bestIdx = dnd.slotIdx, minDist = Infinity;
      cards.forEach(c => {
        const ci = parseInt(c.dataset.slotIdx, 10);
        if (ci === dnd.slotIdx) return;
        const r  = c.getBoundingClientRect();
        const cx = r.left + r.width / 2;
        const dist = Math.abs(e.clientX - cx);
        if (dist < minDist) { minDist = dist; bestIdx = ci; }
      });

      if (bestIdx === dnd.dropIdx) return;
      dnd.dropIdx = bestIdx;

      cards.forEach(c => {
        const ci = parseInt(c.dataset.slotIdx, 10);
        if (ci === dnd.slotIdx) return;
        c.style.transition = 'transform 0.18s ease';
        if (dnd.slotIdx < dnd.dropIdx) {
          c.style.transform = (ci > dnd.slotIdx && ci <= dnd.dropIdx)
            ? `translateX(-${dnd.shiftW}px)` : '';
        } else {
          c.style.transform = (ci >= dnd.dropIdx && ci < dnd.slotIdx)
            ? `translateX(${dnd.shiftW}px)` : '';
        }
      });
    });

    document.addEventListener('mouseup', function () {
      if (!dnd) return;
      const { slotIdx, dropIdx } = dnd;

      dnd.ghost.remove();
      document.getElementById('cgProductsGrid')
        .querySelectorAll('.product-card, .picker-slot')
        .forEach(c => { c.style.transform = ''; c.style.transition = '';
                        c.style.opacity = ''; c.style.pointerEvents = ''; });
      document.body.style.userSelect = '';
      dnd = null;

      if (slotIdx !== dropIdx) {
        const [ms]  = slots.splice(slotIdx, 1);
        const [mv]  = savedSlots.splice(slotIdx, 1);
        const [mtl] = slotTagLocks.splice(slotIdx, 1);
        slots.splice(dropIdx, 0, ms);
        savedSlots.splice(dropIdx, 0, mv);
        slotTagLocks.splice(dropIdx, 0, mtl);
      }
      renderAll();
    });

    // ── Drag-to-reorder (explore section) ───────────────────────────────
    let dndExplore = null;

    document.getElementById('exploreGrid').addEventListener('mousedown', function (e) {
      const handle = e.target.closest('.dots-grid');
      if (!handle) return;
      const card = handle.closest('.product-card');
      if (!card || card.dataset.slot === undefined) return;
      e.preventDefault();
      e.stopPropagation();

      const slotIdx = parseInt(card.dataset.slot, 10);
      const rect    = card.getBoundingClientRect();

      const allCardsForGap = Array.from(document.getElementById('exploreScrollWrapper').querySelectorAll('.product-card'));
      let gapW = 16;
      for (let k = 0; k + 1 < allCardsForGap.length; k++) {
        const ra = allCardsForGap[k].getBoundingClientRect();
        const rb = allCardsForGap[k + 1].getBoundingClientRect();
        const g  = rb.left - ra.right;
        if (g >= 0) { gapW = g; break; }
      }
      const shiftW = rect.width + gapW;

      const ghost = card.cloneNode(true);
      Object.assign(ghost.style, {
        position: 'fixed', width: rect.width + 'px', height: rect.height + 'px',
        top: rect.top + 'px', left: rect.left + 'px',
        opacity: '0.88', pointerEvents: 'none', zIndex: '9999',
        transition: 'none', margin: '0',
        boxShadow: '0 8px 32px rgba(49,34,12,0.22)',
        borderRadius: 'var(--card-radius)',
      });
      document.body.appendChild(ghost);
      card.style.opacity      = '0';
      card.style.pointerEvents = 'none';
      document.body.style.userSelect = 'none';

      dndExplore = { slotIdx, dropIdx: slotIdx, ghost, card, shiftW,
                     offsetX: e.clientX - rect.left, offsetY: e.clientY - rect.top };
    });

    document.addEventListener('mousemove', function (e) {
      if (!dndExplore) return;
      dndExplore.ghost.style.left = (e.clientX - dndExplore.offsetX) + 'px';
      dndExplore.ghost.style.top  = (e.clientY - dndExplore.offsetY) + 'px';

      const cards = Array.from(document.getElementById('exploreGrid').querySelectorAll('.product-card'));
      let bestIdx = dndExplore.slotIdx, minDist = Infinity;
      cards.forEach(c => {
        const ci = parseInt(c.dataset.slot, 10);
        if (ci === dndExplore.slotIdx) return;
        const r  = c.getBoundingClientRect();
        const cx = r.left + r.width / 2;
        const dist = Math.abs(e.clientX - cx);
        if (dist < minDist) { minDist = dist; bestIdx = ci; }
      });

      if (bestIdx === dndExplore.dropIdx) return;
      dndExplore.dropIdx = bestIdx;

      cards.forEach(c => {
        const ci = parseInt(c.dataset.slot, 10);
        if (ci === dndExplore.slotIdx) return;
        c.style.transition = 'transform 0.18s ease';
        if (dndExplore.slotIdx < dndExplore.dropIdx) {
          c.style.transform = (ci > dndExplore.slotIdx && ci <= dndExplore.dropIdx)
            ? `translateX(-${dndExplore.shiftW}px)` : '';
        } else {
          c.style.transform = (ci >= dndExplore.dropIdx && ci < dndExplore.slotIdx)
            ? `translateX(${dndExplore.shiftW}px)` : '';
        }
      });
    });

    document.addEventListener('mouseup', function () {
      if (!dndExplore) return;
      const { slotIdx, dropIdx } = dndExplore;
      dndExplore.ghost.remove();
      document.getElementById('exploreGrid')
        .querySelectorAll('.product-card')
        .forEach(c => { c.style.transform = ''; c.style.transition = '';
                        c.style.opacity = ''; c.style.pointerEvents = ''; });
      document.body.style.userSelect = '';
      dndExplore = null;

      if (slotIdx !== dropIdx) {
        const reorder = arr => { const [item] = arr.splice(slotIdx, 1); arr.splice(dropIdx, 0, item); };
        reorder(exploreSlotProducts);
        reorder(exploreSlotLocked);
        reorder(exploreSlotTagLocks);
        renderExploreSlots(false);
      }
    });

    // ── Lock scroll when all cards fit (no overflow) ────────────────────
    (function () {
      function makeScrollLock(wrapperId, trackId) {
        const wrapper = document.getElementById(wrapperId);
        const track   = document.getElementById(trackId);
        if (!wrapper || !track) return;
        function sync() {
          requestAnimationFrame(() => {
            wrapper.style.overflowX = wrapper.scrollWidth <= wrapper.clientWidth + 1 ? 'hidden' : '';
          });
        }
        new ResizeObserver(sync).observe(wrapper);
        new MutationObserver(sync).observe(track, { childList: true });
      }
      makeScrollLock('cgScrollWrapper',    'cgProductsGrid');
      makeScrollLock('exploreScrollWrapper', 'exploreGrid');
    })();

    // ── Back to top ──────────────────────────────────────────────────────
    document.getElementById('backToTopBtn').addEventListener('click', function () {
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });


    // ── Insert button side detection ─────────────────────────────────────
    (function () {
      const grid = document.getElementById('cgProductsGrid');
      let activeGap = null;

      function setGap(gap) {
        if (gap === activeGap) return;
        if (activeGap) activeGap.classList.remove('show-btn');
        activeGap = gap || null;
        if (activeGap) activeGap.classList.add('show-btn');
      }

      grid.addEventListener('mousemove', function (e) {
        const card = e.target.closest('.product-card, .picker-slot');
        const gap  = e.target.closest('.cg-slot-gap');
        if (card) {
          const r    = card.getBoundingClientRect();
          const relX = (e.clientX - r.left) / r.width;
          const relY = (e.clientY - r.top)  / r.height;
          if (relY < 0.3 || relY > 0.7) { setGap(null); return; }
          if (relX > 0.2 && relX < 0.8) { setGap(null); return; }
          const sibling = relX <= 0.2 ? card.previousElementSibling : card.nextElementSibling;
          setGap(sibling && sibling.classList.contains('cg-slot-gap') ? sibling : null);
        } else if (gap) {
          setGap(gap);
        } else {
          setGap(null);
        }
      });

      grid.addEventListener('mouseleave', function () { setGap(null); });
    })();

    // ── Edit outfit name (always-editable input) ─────────────────────────
    document.getElementById('editNamePencil').addEventListener('click', function () {
      const input = document.getElementById('cgCollectionName');
      input.focus();
      input.select();
    });

    // Auto-resize the input to match its text content, capped before right-side elements
    (function () {
      const input  = document.getElementById('cgCollectionName');
      const canvas = document.createElement('canvas');
      const ctx    = canvas.getContext('2d');

      function getMaxWidth() {
        const header = document.querySelector('.outfit-detail-header');
        const right  = document.querySelector('.attr-search-section');
        if (!header || !right) return window.innerWidth / 2;
        return header.getBoundingClientRect().width - right.getBoundingClientRect().width - 48;
      }

      function resizeName() {
        const cs = window.getComputedStyle(input);
        ctx.font = cs.fontWeight + ' ' + cs.fontSize + ' ' + cs.fontFamily;
        const text = input.value || input.placeholder;
        const ideal = Math.ceil(ctx.measureText(text).width) + 16;
        input.style.width = Math.min(getMaxWidth(), Math.max(120, ideal)) + 'px';
      }

      input.addEventListener('input', resizeName);
      window.addEventListener('resize', resizeName);
      requestAnimationFrame(resizeName);
    })();

    // Auto-save name on blur or Enter
    document.getElementById('cgCollectionName').addEventListener('blur', function () {
      const name = this.value.trim();
      const cs   = getOutfits();
      const coll = cs.find(c => c.id === collectionId);
      if (coll) {
        coll.name = name || 'New outfit';
        saveOutfits(cs);
        document.title = coll.name + ' — The Choice Architect';
      }
    });

    document.getElementById('cgCollectionName').addEventListener('keydown', function (e) {
      if (e.key === 'Enter') { e.preventDefault(); this.blur(); }
    });
  </script>

  <script>
    (function () {
      var btn = document.getElementById('avatarBtn');
      var dd  = document.getElementById('avatarDropdown');
      btn.addEventListener('click', function (e) {
        e.stopPropagation();
        var open = dd.classList.toggle('is-open');
        btn.setAttribute('aria-expanded', String(open));
      });
      document.addEventListener('click', function () {
        dd.classList.remove('is-open');
        btn.setAttribute('aria-expanded', 'false');
      });
    })();
  </script>

</body>
